<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비접촉식 과일/채소 신선도 스캐너 시뮬레이션</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        .controls { background: #e8eaed; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .control-group { margin-bottom: 15px; }
        label { font-weight: bold; color: #34495e; display: block; margin-bottom: 8px;}
        select, input[type=range] { width: 100%; cursor: pointer; padding: 8px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;}
        input[type=range] { padding: 0; margin-top: 5px; }
        .desc { font-size: 13px; color: #555; margin-top: 15px; line-height: 1.5; background: #fff; padding: 10px; border-radius: 5px; border: 1px dashed #bdc3c7;}
        .simulation-area { text-align: center; margin-bottom: 20px; position: relative; }
        canvas { background: #ffffff; border: 2px solid #bdc3c7; border-radius: 8px; width: 100%; max-width: 700px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .dashboard { display: flex; gap: 15px; text-align: center; }
        .card { flex: 1; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6; }
        .card h4 { margin: 0 0 10px 0; color: #7f8c8d; font-size: 14px; }
        .value { font-size: 24px; font-weight: bold; color: #2c3e50; }
        .led-panel { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 20px; padding: 15px; background: #2c3e50; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; }
        .led { width: 40px; height: 40px; border-radius: 50%; background: #555; transition: 0.3s; border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 비접촉식 전자기 유도 신선도 스캐너</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>1. 측정 대상 모형 선택:</label>
            <select id="target-type">
                <option value="apple">🍎 사과 (과육류)</option>
                <option value="lettuce">🥬 상추 (엽채류)</option>
            </select>
        </div>
        
        <div class="control-group">
            <label>2. 식물 신선도 조절: <span id="freshness-val" style="color:#27ae60;">100%</span></label>
            <input type="range" id="freshness" min="0" max="100" value="100">
        </div>
        
        <div class="desc">
            * <b>[생명과학]</b> 신선할 때는 온전한 세포막(초록 테두리)이 이온을 가두지만, 시들면 갈변/황백화되며 세포막이 붕괴하여 이온(노란 점)이 누출됩니다.<br>
            * <b>[물리학]</b> 전해질 누출로 유도 와전류(빨간 점선)가 강해지며, 렌츠의 법칙(자기장 상쇄 효과)에 의해 수신 전압은 오히려 <b>감소</b>합니다.
        </div>
    </div>

    <div class="simulation-area">
        <canvas id="simCanvas" width="700" height="300"></canvas>
    </div>

    <div class="dashboard">
        <div class="card">
            <h4>발생한 식물 내부 와전류</h4>
            <div id="eddy-disp" class="value" style="color:#e74c3c;">0.0 mA</div>
        </div>
        <div class="card">
            <h4>수신 코일 측정 전압 (알짜 자기장)</h4>
            <div id="voltage-disp" class="value" style="color:#3498db;">10.0 mV</div>
        </div>
    </div>

    <div class="led-panel">
        <div>스캐너 판독 결과: </div>
        <div id="led-light" class="led"></div>
        <div id="led-text">대기중</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const freshnessSlider = document.getElementById('freshness');
    const targetSelector = document.getElementById('target-type');
    const ledLight = document.getElementById('led-light');
    const ledText = document.getElementById('led-text');

    let time = 0;

    // 사과 그리기 함수 (베지에 곡선 활용)
    function drawApple(ctx, x, y, radius, freshness) {
        let decay = (100 - freshness) / 100;
        // 신선도에 따른 색상 변화 (빨강 -> 갈변된 흑갈색)
        let r = Math.floor(231 - decay * (231 - 139)); 
        let g = Math.floor(76 - decay * (76 - 69));   
        let b = Math.floor(60 - decay * (60 - 19));
        
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        
        // 사과 몸통
        ctx.beginPath();
        ctx.moveTo(x, y - radius * 0.5);
        ctx.bezierCurveTo(x + radius * 1.2, y - radius * 0.8, x + radius * 1.2, y + radius * 1.1, x, y + radius * 0.9);
        ctx.bezierCurveTo(x - radius * 1.2, y + radius * 1.1, x - radius * 1.2, y - radius * 0.8, x, y - radius * 0.5);
        ctx.fill();
        ctx.strokeStyle = `rgba(0,0,0,0.2)`;
        ctx.lineWidth = 1;
        ctx.stroke();

        // 사과 꼭지
        ctx.beginPath();
        ctx.moveTo(x, y - radius * 0.5);
        ctx.quadraticCurveTo(x - 5, y - radius * 0.9, x + 10, y - radius * 1.1);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#5c4033';
        ctx.stroke();

        // 사과 잎
        ctx.beginPath();
        ctx.moveTo(x + 5, y - radius * 0.8);
        ctx.quadraticCurveTo(x + 20, y - radius * 1.2, x + 30, y - radius * 0.6);
        ctx.quadraticCurveTo(x + 15, y - radius * 0.4, x + 5, y - radius * 0.8);
        
        // 잎도 시들게 (초록 -> 누런 갈색)
        let lr = Math.floor(46 + decay * (189 - 46));
        let lg = Math.floor(204 - decay * (204 - 165));
        let lb = Math.floor(113 - decay * (113 - 32));
        ctx.fillStyle = `rgb(${lr}, ${lg}, ${lb})`; 
        ctx.fill();
        ctx.stroke();
    }

    // 상추 그리기 함수 (삼각함수 파동 활용)
    function drawLettuce(ctx, x, y, radius, freshness) {
        let decay = (100 - freshness) / 100;
        // 신선도에 따른 색상 변화 (초록 -> 황백화된 누런색)
        let baseR = Math.floor(46 + decay * (166 - 46));
        let baseG = Math.floor(204 - decay * (204 - 142));
        let baseB = Math.floor(113 - decay * (113 - 56));

        // 상추 잎 겹겹이 그리기
        let layers = 3;
        for (let j = layers; j > 0; j--) {
            ctx.beginPath();
            let currentR = radius * (0.4 + j * 0.25);
            for (let i = 0; i <= Math.PI * 2; i += 0.1) {
                // 물결 모양 수학 함수 (sin)
                let rWave = currentR + Math.sin(i * 12) * 6;
                let px = x + Math.cos(i) * rWave;
                let py = y + Math.sin(i) * rWave;
                if(i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            // 안쪽 잎일수록 색이 밝아짐
            ctx.fillStyle = `rgb(${Math.min(255, baseR + j*15)}, ${Math.min(255, baseG + j*15)}, ${Math.min(255, baseB + j*10)})`;
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = `rgba(0, 50, 0, 0.15)`;
            ctx.stroke();
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        let freshness = parseInt(freshnessSlider.value);
        let decay = (100 - freshness) / 100; // 0 (신선) ~ 1 (시듦)
        let target = targetSelector.value;
        
        document.getElementById('freshness-val').innerText = freshness + "%";
        document.getElementById('freshness-val').style.color = freshness > 50 ? "#27ae60" : "#c0392b";

        // 물리 연산 (렌츠의 법칙 상쇄 효과)
        let eddyCurrent = decay * 8.5; 
        let baseVoltage = 10.0;
        let opposingField = decay * 7.5; 
        let netVoltage = Math.max(0, baseVoltage - opposingField); 

        document.getElementById('eddy-disp').innerText = eddyCurrent.toFixed(1) + " mA";
        document.getElementById('voltage-disp').innerText = netVoltage.toFixed(1) + " mV";

        // LED 상태 업데이트
        if (netVoltage >= 7.0) {
            ledLight.style.background = "#2ecc71";
            ledLight.style.boxShadow = "0 0 20px #2ecc71";
            ledText.innerText = "신선함 (Fresh) - 절연 상태 유지";
            ledText.style.color = "#2ecc71";
        } else if (netVoltage >= 4.0) {
            ledLight.style.background = "#f1c40f";
            ledLight.style.boxShadow = "0 0 20px #f1c40f";
            ledText.innerText = "보통 (Normal) - 일부 차폐 발생";
            ledText.style.color = "#f1c40f";
        } else {
            ledLight.style.background = "#e74c3c";
            ledLight.style.boxShadow = "0 0 20px #e74c3c";
            ledText.innerText = "시듦 (Rotten) - 강한 상쇄 효과";
            ledText.style.color = "#e74c3c";
        }

        /* --- 캔버스 드로잉 --- */
        // 1. 송신 코일 (Tx)
        ctx.fillStyle = "#34495e";
        ctx.fillRect(50, 80, 40, 140);
        ctx.fillStyle = "#222";
        ctx.font = "bold 14px Arial";
        ctx.fillText("송신 (Tx)", 40, 240);

        // 송신 자기장 파동 (파란색)
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        for (let i = 0; i < 4; i++) {
            let r = ((time * 1.5 + i * 40) % 160) * 1.5;
            ctx.strokeStyle = `rgba(52, 152, 219, ${1 - r/240})`;
            ctx.beginPath();
            ctx.arc(90, 150, r, -Math.PI/3, Math.PI/3);
            ctx.stroke();
        }

        let centerX = 350;
        let centerY = 150;

        // 2. 선택된 식물 그리기 (가운데)
        if (target === 'apple') {
            drawApple(ctx, centerX, centerY, 45, freshness);
        } else {
            drawLettStokes(ctx, centerX, centerY, 50, freshness); // Note: Calling wrapper for standardizing names
            drawLettuce(ctx, centerX, centerY, 55, freshness);
        }

        // 3. 생명과학: 세포막 시각화 및 이온 누출
        let membraneR = target === 'apple' ? 55 : 65;
        ctx.beginPath();
        ctx.arc(centerX, centerY, membraneR, 0, Math.PI * 2);
        if (decay === 0) {
            ctx.strokeStyle = "rgba(46, 204, 113, 0.8)"; // 튼튼한 세포막 (초록)
            ctx.lineWidth = 3;
            ctx.setLineDash([]);
        } else {
            ctx.strokeStyle = `rgba(231, 76, 60, ${decay})`; // 파괴되는 세포막 (빨강)
            ctx.lineWidth = 3;
            ctx.setLineDash([10 - decay * 8, 5 + decay * 10]); // 시들수록 간격이 벌어짐
        }
        ctx.stroke();
        ctx.setLineDash([]);

        // 생명과학: 전해질 누출 (이온 애니메이션)
        if (decay > 0) {
            ctx.fillStyle = "rgba(241, 196, 15, 0.9)"; // 칼륨/칼슘 이온 (노란 점)
            for (let i = 0; i < 8; i++) {
                let angle = (time * 0.05) + (i * Math.PI / 4);
                let distance = membraneR - 5 + (time * 0.5 + i * 15) % (50 * decay + 10); // 시들수록 멀리 퍼짐
                let ionX = centerX + Math.cos(angle) * distance;
                let ionY = centerY + Math.sin(angle) * distance;
                ctx.beginPath();
                ctx.arc(ionX, ionY, 3.5, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // 4. 물리학: 와전류 및 2차 방해 자기장 시각화
        if (decay > 0) {
            // 식물 내부 와전류 (빨간 점선)
            ctx.strokeStyle = `rgba(231, 76, 60, ${decay})`;
            ctx.lineWidth = 2 + decay * 4;
            ctx.setLineDash([6, 6]);
            let eddyR = target === 'apple' ? 35 : 45;
            eddyR += Math.sin(time * 0.2) * 5;
            ctx.beginPath();
            ctx.arc(centerX, centerY, eddyR, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);

            // 렌츠의 법칙: 반대 방향으로 향하는 2차 방해 자기장 (빨간 실선)
            for (let i = 0; i < 3; i++) {
                let r2 = ((time * 1.5 + i * 30) % 100) * 1.5;
                ctx.strokeStyle = `rgba(231, 76, 60, ${decay * (1 - r2/150)})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r2, Math.PI - Math.PI/3, Math.PI + Math.PI/3); 
                ctx.stroke();
                
                // 수신 코일로 향하는 상쇄된 잉여 파동 (약해진 파란색)
                ctx.strokeStyle = `rgba(52, 152, 219, ${(1 - decay) * (1 - r2/150)})`;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r2, -Math.PI/4, Math.PI/4);
                ctx.stroke();
            }
        } else {
            // 100% 신선할 때는 원래 파동이 온전히 수신 코일로 넘어감
            for (let i = 0; i < 3; i++) {
                let r2 = ((time * 1.5 + i * 30) % 100) * 1.5;
                ctx.strokeStyle = `rgba(52, 152, 219, ${1 - r2/150})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(centerX, centerY, r2, -Math.PI/4, Math.PI/4);
                ctx.stroke();
            }
        }

        // 5. 수신 코일 (Rx)
        ctx.fillStyle = "#34495e";
        ctx.fillRect(610, 80, 40, 140);
        ctx.fillStyle = "#222";
        ctx.fillText("수신 (Rx)", 600, 240);

        // 이론 설명 텍스트
        ctx.fillStyle = "#7f8c8d";
        ctx.font = "12px Arial";
        ctx.fillText("알짜 자기장 = (파란색 1차 자기장) - (빨간색 와전류 방해 자기장)", 180, 25);

        time++;
        requestAnimationFrame(draw);
    }

    // 빈 래퍼 함수 (호출 오류 방지용)
    function drawLettStokes() {}

    draw();
</script>
</body>
</html>
